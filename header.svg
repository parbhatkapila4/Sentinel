<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 360" width="1200" height="360" role="img" aria-label="Sentinel - CRM is the permission layer. A message is ingested only if a participant already exists in your CRM.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0C0A08"/>
      <stop offset="1" stop-color="#1A150E"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#E2A24E"/>
      <stop offset="1" stop-color="#F2C886"/>
    </linearGradient>
    <linearGradient id="accV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F2C886"/>
      <stop offset="1" stop-color="#E2A24E"/>
    </linearGradient>
    <radialGradient id="depth" cx="0.8" cy="0.46" r="0.55">
      <stop offset="0" stop-color="#E8A24E" stop-opacity="0.13"/>
      <stop offset="1" stop-color="#E8A24E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="depth2" cx="0.06" cy="0.85" r="0.5">
      <stop offset="0" stop-color="#7A5A2A" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#7A5A2A" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <clipPath id="round"><rect width="1200" height="360" rx="22"/></clipPath>
    <path id="p1" d="M832 112 C 900 112, 944 150, 992 158"/>
    <path id="p2" d="M832 176 C 904 176, 948 178, 992 180"/>
    <path id="p3" d="M832 240 C 900 240, 944 206, 992 202"/>
    <path id="pk" d="M1002 150 C 1040 150, 1064 150, 1090 150"/>
    <path id="pd" d="M1002 210 C 1028 213, 1050 215, 1068 216"/>
  </defs>

  <g clip-path="url(#round)">
    <rect width="1200" height="360" fill="url(#bg)"/>
    <rect width="1200" height="360" fill="url(#depth)"/>
    <rect width="1200" height="360" fill="url(#depth2)"/>
    <rect x="0" y="0" width="1200" height="3" fill="url(#acc)" opacity="0.9"/>

    <!-- logomark: permission gate / shield -->
    <g transform="translate(72,52)">
      <path d="M20 1 L39 9 V22 C39 35 31 43 20 46 C9 43 1 35 1 22 V9 Z" fill="#E2A24E" fill-opacity="0.08" stroke="url(#accV)" stroke-width="2.2"/>
      <path d="M11 22 l6 6 l12 -14" fill="none" stroke="#F2C886" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <text x="128" y="82" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Consolas, monospace" font-size="13" letter-spacing="3.5" fill="#E2A24E">REVENUE INTELLIGENCE · CRM-GATED</text>

    <text x="69" y="172" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="80" font-weight="800" letter-spacing="-1.5" fill="#F4F0E9">Sentinel</text>
    <rect x="74" y="190" width="66" height="3" rx="1.5" fill="url(#acc)"/>

    <text x="72" y="236" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="30" font-weight="650" fill="#ECE6DC">CRM is the <tspan fill="#F2C886">permission layer</tspan>.</text>

    <text x="72" y="273" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="16.5" fill="#9A9081">A message is ingested only if a participant already exists in your CRM.</text>

    <text x="72" y="322" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Consolas, monospace" font-size="12.5" letter-spacing="1.5" fill="#6E665A">Next.js 16 · TypeScript · Prisma · Postgres · Clerk · Redis</text>

    <!-- gate motif -->
    <g font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Consolas, monospace" font-size="13" fill="#8A8275">
      <text x="812" y="116" text-anchor="end">Gmail</text>
      <text x="812" y="180" text-anchor="end">Calendar</text>
      <text x="812" y="244" text-anchor="end">Slack</text>
    </g>
    <circle cx="826" cy="112" r="3.5" fill="#6E665A"/>
    <circle cx="826" cy="176" r="3.5" fill="#6E665A"/>
    <circle cx="826" cy="240" r="3.5" fill="#6E665A"/>

    <use xlink:href="#p1" fill="none" stroke="#46403A" stroke-width="1.5"/>
    <use xlink:href="#p2" fill="none" stroke="#46403A" stroke-width="1.5"/>
    <use xlink:href="#p3" fill="none" stroke="#46403A" stroke-width="1.5"/>

    <!-- gate bar with pulsing glow -->
    <rect x="994" y="92" width="8" height="176" rx="4" fill="#E8A24E" filter="url(#glow)" opacity="0.4">
      <animate attributeName="opacity" values="0.25;0.6;0.25" dur="3s" repeatCount="indefinite"/>
    </rect>
    <rect x="994" y="92" width="8" height="176" rx="4" fill="url(#accV)"/>
    <text x="998" y="80" text-anchor="middle" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Consolas, monospace" font-size="11" letter-spacing="2.5" fill="#E2A24E">PERMISSION FILTER</text>

    <!-- kept -->
    <use xlink:href="#pk" fill="none" stroke="#B98A4E" stroke-width="2" opacity="0.55"/>
    <circle cx="1094" cy="150" r="6" fill="#F2C886">
      <animate attributeName="r" values="6;7.6;6" dur="2.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.65;1" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <text x="1094" y="178" text-anchor="middle" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Consolas, monospace" font-size="11" letter-spacing="1.5" fill="#F2C886">KEPT</text>

    <!-- dropped -->
    <use xlink:href="#pd" fill="none" stroke="#46403A" stroke-width="1.6"/>
    <path d="M1073 211 l10 10 M1083 211 l-10 10" stroke="#C56B63" stroke-width="1.8" stroke-linecap="round"/>
    <text x="1078" y="240" text-anchor="middle" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Consolas, monospace" font-size="11" letter-spacing="1.5" fill="#756C5F">DROPPED</text>

    <!-- flowing messages -->
    <circle r="3.2" fill="#C8A06A" opacity="0">
      <animateMotion dur="2.4s" begin="0s" repeatCount="indefinite" calcMode="linear"><mpath xlink:href="#p1"/></animateMotion>
      <animate attributeName="opacity" dur="2.4s" begin="0s" repeatCount="indefinite" values="0;1;1;0" keyTimes="0;0.12;0.75;1"/>
    </circle>
    <circle r="3.2" fill="#C8A06A" opacity="0">
      <animateMotion dur="2.4s" begin="0.8s" repeatCount="indefinite" calcMode="linear"><mpath xlink:href="#p2"/></animateMotion>
      <animate attributeName="opacity" dur="2.4s" begin="0.8s" repeatCount="indefinite" values="0;1;1;0" keyTimes="0;0.12;0.75;1"/>
    </circle>
    <circle r="3.2" fill="#C8A06A" opacity="0">
      <animateMotion dur="2.4s" begin="1.6s" repeatCount="indefinite" calcMode="linear"><mpath xlink:href="#p3"/></animateMotion>
      <animate attributeName="opacity" dur="2.4s" begin="1.6s" repeatCount="indefinite" values="0;1;1;0" keyTimes="0;0.12;0.75;1"/>
    </circle>
    <circle r="3.4" fill="#F2C886" opacity="0">
      <animateMotion dur="1.4s" begin="0.6s" repeatCount="indefinite" calcMode="linear"><mpath xlink:href="#pk"/></animateMotion>
      <animate attributeName="opacity" dur="1.4s" begin="0.6s" repeatCount="indefinite" values="0;1;1;0" keyTimes="0;0.15;0.8;1"/>
    </circle>
    <circle r="3" fill="#B07A72" opacity="0">
      <animateMotion dur="1.4s" begin="1.9s" repeatCount="indefinite" calcMode="linear"><mpath xlink:href="#pd"/></animateMotion>
      <animate attributeName="opacity" dur="1.4s" begin="1.9s" repeatCount="indefinite" values="0;1;0.5;0" keyTimes="0;0.2;0.7;1"/>
    </circle>
  </g>

  <rect x="0.5" y="0.5" width="1199" height="359" rx="22" fill="none" stroke="#FFFFFF" stroke-opacity="0.06"/>
</svg>
